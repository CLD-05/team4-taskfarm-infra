# =============================================================================
# Terraform Plan and Apply
#
# [운영 메모]
# - 이 워크플로우는 infra(VPC/EKS/RDS 등 기반)만 CI/CD로 관리한다.
#   platform-addons(ALB Controller/ArgoCD/ESO/모니터링)는 helm/kubectl 기반이라
#   클러스터 상태에 민감하고 설치 순서(webhook race 등) 이슈가 있어,
#   의도적으로 수동(terraform apply)으로 운영한다.
# - apply job은 plan을 다시 실행해 적용한다. 더 엄격히 하려면 plan job의 tfplan을
#   artifact로 넘겨 동일 plan을 apply해야 하나(plan=apply 보장), 현 규모에선
#   현재 방식으로 충분하다고 판단. (향후 개선 TODO)
# =============================================================================
name: Terraform Plan and Apply

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - prod
      apply:
        description: "Run terraform apply?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      allow_destroy:
        description: "Allow destroy changes?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-2
  TF_VERSION: 1.15.6

jobs:
  plan:
    name: Terraform Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - environment: dev
            working_directory: infra/envs/dev/infra
            tfvars_secret: DEV_TFVARS
          - environment: prod
            working_directory: infra/envs/prod/infra
            tfvars_secret: PROD_TFVARS

    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars to runner temp
        env:
          TFVARS_CONTENT: ${{ secrets[matrix.tfvars_secret] }}
        run: |
          TFVARS_FILE="$RUNNER_TEMP/${{ matrix.environment }}.tfvars"
          printf '%s\n' "$TFVARS_CONTENT" > "$TFVARS_FILE"
          chmod 600 "$TFVARS_FILE"
          echo "TFVARS_FILE=$TFVARS_FILE" >> "$GITHUB_ENV"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          set -o pipefail
          terraform plan \
            -no-color \
            -input=false \
            -var-file="$TFVARS_FILE" \
            -out=tfplan

          terraform show -no-color tfplan > plan.txt

      - name: Mask sensitive values in plan
        run: |
          MASKED_PLAN="$RUNNER_TEMP/plan-masked.txt"
          cp plan.txt "$MASKED_PLAN"

          # tfvars의 각 값을 plan.txt에서 마스킹.
          # - sed 구분자/정규식 특수문자가 값에 있어도 깨지지 않도록 이스케이프
          # - 너무 짧은 값(2글자 이하: "1","dev" 등)은 plan 전반을 오염시키므로 스킵
          grep -E '^[[:space:]]*[A-Za-z0-9_]+[[:space:]]*=' "$TFVARS_FILE" | while IFS='=' read -r key value; do
            clean_value=$(echo "$value" | sed 's/^ *//; s/ *$//; s/^"//; s/"$//')

            if [ -n "$clean_value" ] && [ "${#clean_value}" -gt 2 ]; then
              # sed에서 안전하도록 정규식 메타문자/구분자(|) 이스케이프
              escaped_value=$(printf '%s' "$clean_value" | sed -e 's/[][\/.*^$|]/\\&/g')
              sed -i "s|$escaped_value|***MASKED***|g" "$MASKED_PLAN" || true
            fi
          done

          mv "$MASKED_PLAN" plan.txt

      - name: Create plan summary
        run: |
          {
            echo "## Terraform Plan - ${{ matrix.environment }}"
            echo
            grep -E "^(Plan:|No changes\.)" plan.txt || echo "Plan completed. See workflow artifact for details."
            echo
            echo "Full masked plan output is uploaded as an artifact."
          } > plan-summary.md

      - name: Upload masked plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: ${{ matrix.working_directory }}/plan.txt

      - name: Comment plan summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('${{ matrix.working_directory }}/plan-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Cleanup tfvars
        if: always()
        run: |
          rm -f "$TFVARS_FILE"

  apply-dev:
    name: Terraform Apply Dev
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: infra/envs/dev/infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars to runner temp
        env:
          TFVARS_CONTENT: ${{ secrets.DEV_TFVARS }}
        run: |
          TFVARS_FILE="$RUNNER_TEMP/dev.tfvars"
          printf '%s\n' "$TFVARS_CONTENT" > "$TFVARS_FILE"
          chmod 600 "$TFVARS_FILE"
          echo "TFVARS_FILE=$TFVARS_FILE" >> "$GITHUB_ENV"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan dev
        run: |
          set -o pipefail
          terraform plan \
            -no-color \
            -input=false \
            -var-file="$TFVARS_FILE" \
            -out=tfplan

          terraform show -no-color tfplan > plan.txt

      - name: Mask sensitive values in dev plan
        run: |
          MASKED_PLAN="$RUNNER_TEMP/plan-masked.txt"
          cp plan.txt "$MASKED_PLAN"

          grep -E '^[[:space:]]*[A-Za-z0-9_]+[[:space:]]*=' "$TFVARS_FILE" | while IFS='=' read -r key value; do
            clean_value=$(echo "$value" | sed 's/^ *//; s/ *$//; s/^"//; s/"$//')

            if [ -n "$clean_value" ] && [ "${#clean_value}" -gt 2 ]; then
              escaped_value=$(printf '%s' "$clean_value" | sed -e 's/[][\/.*^$|]/\\&/g')
              sed -i "s|$escaped_value|***MASKED***|g" "$MASKED_PLAN" || true
            fi
          done

          mv "$MASKED_PLAN" plan.txt

      # destroy 차단: 단순 "destroy" 문자열이 아니라 plan 요약의 destroy 카운트로 판정
      # (리소스 설명/변수명에 'destroy'가 들어가도 오탐하지 않도록)
      - name: Block destructive changes on dev auto apply
        run: |
          if grep -qE "^Plan:.*[1-9][0-9]* to destroy" plan.txt; then
            echo "Destructive changes detected (Plan shows resources to destroy). Auto apply is blocked."
            grep -E "^Plan:" plan.txt || true
            exit 1
          fi

      - name: Terraform apply dev
        run: terraform apply -auto-approve -input=false tfplan

      - name: Cleanup tfvars
        if: always()
        run: |
          rm -f "$TFVARS_FILE"

  apply-prod:
    name: Terraform Apply Prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod' && github.event.inputs.apply == 'true'
    environment: prod

    defaults:
      run:
        working-directory: infra/envs/prod/infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars to runner temp
        env:
          TFVARS_CONTENT: ${{ secrets.PROD_TFVARS }}
        run: |
          TFVARS_FILE="$RUNNER_TEMP/prod.tfvars"
          printf '%s\n' "$TFVARS_CONTENT" > "$TFVARS_FILE"
          chmod 600 "$TFVARS_FILE"
          echo "TFVARS_FILE=$TFVARS_FILE" >> "$GITHUB_ENV"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan prod
        run: |
          set -o pipefail
          terraform plan \
            -no-color \
            -input=false \
            -var-file="$TFVARS_FILE" \
            -out=tfplan

          terraform show -no-color tfplan > plan.txt

      - name: Mask sensitive values in prod plan
        run: |
          MASKED_PLAN="$RUNNER_TEMP/plan-masked.txt"
          cp plan.txt "$MASKED_PLAN"

          grep -E '^[[:space:]]*[A-Za-z0-9_]+[[:space:]]*=' "$TFVARS_FILE" | while IFS='=' read -r key value; do
            clean_value=$(echo "$value" | sed 's/^ *//; s/ *$//; s/^"//; s/"$//')

            if [ -n "$clean_value" ] && [ "${#clean_value}" -gt 2 ]; then
              escaped_value=$(printf '%s' "$clean_value" | sed -e 's/[][\/.*^$|]/\\&/g')
              sed -i "s|$escaped_value|***MASKED***|g" "$MASKED_PLAN" || true
            fi
          done

          mv "$MASKED_PLAN" plan.txt

      - name: Block destructive changes unless allowed
        if: github.event.inputs.allow_destroy != 'true'
        run: |
          if grep -qE "^Plan:.*[1-9][0-9]* to destroy" plan.txt; then
            echo "Destructive changes detected (Plan shows resources to destroy). Set allow_destroy=true to proceed."
            grep -E "^Plan:" plan.txt || true
            exit 1
          fi

      - name: Terraform apply prod
        run: terraform apply -auto-approve -input=false tfplan

      - name: Cleanup tfvars
        if: always()
        run: |
          rm -f "$TFVARS_FILE"
