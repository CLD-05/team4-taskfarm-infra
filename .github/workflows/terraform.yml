name: Terraform Plan and Apply

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-2
  TF_VERSION: 1.14.0

jobs:
  plan:
    name: Terraform Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - environment: dev
            working_directory: infra/envs/dev/infra
            tfvars_secret: DEV_TFVARS
          - environment: prod
            working_directory: infra/envs/prod/infra
            tfvars_secret: PROD_TFVARS

    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars
        run: |
          cat > terraform.tfvars <<'EOF'
          ${{ secrets[matrix.tfvars_secret] }}
          EOF

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -input=false 2>&1 | tee plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ matrix.working_directory }}/plan.txt';
            const plan = fs.readFileSync(path, 'utf8');

            const body = `## Terraform Plan - ${{ matrix.environment }}

            \`\`\`
            ${plan.slice(0, 60000)}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  apply-dev:
    name: Terraform Apply Dev
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: infra/envs/dev/infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars
        run: |
          cat > terraform.tfvars <<'EOF'
          ${{ secrets.DEV_TFVARS }}
          EOF

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply dev
        run: terraform apply -auto-approve -input=false

  apply-prod:
    name: Terraform Apply Prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: prod

    defaults:
      run:
        working-directory: infra/envs/prod/infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars
        run: |
          cat > terraform.tfvars <<'EOF'
          ${{ secrets.PROD_TFVARS }}
          EOF

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan prod
        run: terraform plan -no-color -input=false

      - name: Terraform apply prod
        run: terraform apply -auto-approve -input=false